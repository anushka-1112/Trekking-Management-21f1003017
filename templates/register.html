<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <form method="POST" action="/register">
        <label for="user_email">Email Id</label>
        <input type="email" id="user_email" name="user_email" required><br>

        <label for="user_password">Password</label>
        <input type="password" id="user_password" name="user_password" required><br>

        <label for="user_name">Name</label>
        <input type="text" id="user_name" name="user_name" required><br>

        <label for="role">Role</label>
        <input type="radio" name="role" value="user"> Trekker &nbsp;
        <input type="radio" name="role" value="trek_staff"> Trek Staff &nbsp;

        <input type="submit" value="Register">
    </form>
    <a href="/login"><button>Login</button></a>
</body>
</html>
